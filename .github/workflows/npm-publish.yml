name: NPM Publish

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Publish @vcian/lint-sage
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @vcian/eslint-config-react
        run: npm publish --access public
        working-directory: packages/eslint-config-react
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @vcian/eslint-config-node
        run: npm publish --access public
        working-directory: packages/eslint-config-node
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @vcian/eslint-config-angular
        run: npm publish --access public
        working-directory: packages/eslint-config-angular
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @vcian/prettier-config
        run: npm publish --access public
        working-directory: packages/prettier-config
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @vcian/commitlint-config
        run: npm publish --access public
        working-directory: packages/commitlint-config
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
